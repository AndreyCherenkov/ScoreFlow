version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: scoring-postgres
    restart: always
    environment:
      POSTGRES_DB: scoring_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - ../src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data: